<header class="sticky top-0 z-40 border-b border-slate-200/80 bg-slate-950/90 text-slate-100 backdrop-blur">
    <div class="mx-auto flex max-w-[1440px] items-center justify-between px-4 py-3 md:px-6">
        <div class="flex items-center gap-3">
            <a class="text-sm font-semibold tracking-wide text-white" routerLink="/">money.jurre.dev</a>
            <span
                class="hidden rounded-full border border-slate-700 bg-slate-900/80 px-2 py-0.5 text-[10px] uppercase tracking-[0.24em] text-slate-300 md:inline"
            >
                Dashboard
            </span>
        </div>

        <nav class="flex items-center gap-1 rounded-full border border-slate-800 bg-slate-900/80 p-1 text-sm">
            <a
                routerLink="/"
                routerLinkActive="bg-white text-slate-950"
                [routerLinkActiveOptions]="{ exact: true }"
                class="rounded-full px-4 py-2 text-slate-300 transition hover:text-white"
                >Home</a
            >
            <a
                routerLink="/labels"
                routerLinkActive="bg-white text-slate-950"
                class="rounded-full px-4 py-2 text-slate-300 transition hover:text-white"
                >Labels</a
            >
            <a
                routerLink="/transactions"
                routerLinkActive="bg-white text-slate-950"
                class="rounded-full px-4 py-2 text-slate-300 transition hover:text-white"
                >Transactions</a
            >
        </nav>
    </div>
</header>

<main class="mx-auto min-h-[calc(100vh-64px)] max-w-[1440px] px-4 py-6 md:px-6 lg:px-8">
    <router-outlet></router-outlet>
</main>
