<div class="rounded-2xl border border-slate-200/80 bg-slate-950/95 p-4 text-slate-100 shadow-xl shadow-slate-950/10">
    <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-sky-300">Filters</p>
            <h3 class="mt-1 text-lg font-semibold text-white">Transaction review controls</h3>
            <p class="mt-1 text-sm leading-6 text-slate-300">Keep the panel focused on search, labels, sorting, and grouping.</p>
        </div>

        <button
            type="button"
            class="inline-flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:bg-slate-800"
            (click)="clearFilters()"
        >
            Clear filters
        </button>
    </div>

    <div class="mt-4 grid gap-4">
        <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
            <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Search</label>
            <input
                type="text"
                [(ngModel)]="description"
                placeholder="Search description, merchant, or naam"
                class="mt-3 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 placeholder-slate-500 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
            />
        </section>

        <div class="grid gap-4 xl:grid-cols-2">
            <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Date range</label>
                <div class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
                    <input
                        type="date"
                        [(ngModel)]="dateFrom"
                        class="rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
                    />
                    <input
                        type="date"
                        [(ngModel)]="dateTo"
                        class="rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
                    />
                </div>
            </section>

            <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Sort</label>
                <div class="mt-3 flex flex-wrap gap-2">
                    <button
                        type="button"
                        class="inline-flex items-center gap-2 rounded-full border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-500 hover:bg-slate-800"
                        (click)="setSort('date')"
                        aria-label="Sort by date"
                    >
                        <span>Date</span>
                        <span class="text-slate-400">{{ getSortIcon('date') }}</span>
                    </button>
                    <button
                        type="button"
                        class="inline-flex items-center gap-2 rounded-full border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-500 hover:bg-slate-800"
                        (click)="setSort('amount')"
                        aria-label="Sort by amount"
                    >
                        <span>Amount</span>
                        <span class="text-slate-400">{{ getSortIcon('amount') }}</span>
                    </button>
                </div>
            </section>
        </div>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Labels</label>
                    <p class="mt-1 text-sm text-slate-300">Filter by one or more labels to narrow the review set.</p>
                </div>
                <input
                    type="text"
                    [(ngModel)]="labelSearch"
                    placeholder="Filter labels"
                    class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 placeholder-slate-500 outline-none transition sm:max-w-48 focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
                />
            </div>

            <div
                class="mt-4 grid max-h-80 gap-2 overflow-y-auto pr-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5"
            >
                @for (lbl of filteredLabels(); track lbl.id) {
                    <label
                        class="flex cursor-pointer items-center gap-2 rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2 text-sm text-slate-200 transition hover:border-slate-600 hover:bg-slate-950"
                    >
                        <input
                            type="checkbox"
                            [checked]="selectedLabelIds.includes(lbl.id)"
                            (change)="toggleLabel(lbl.id)"
                            class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-sky-400"
                        />
                        <span
                            class="inline-flex min-w-0 items-center gap-2 rounded-full px-2.5 py-1 text-xs font-medium"
                            [style.background]="lbl.color"
                            [style.color]="'#fff'"
                        >
                            <span class="truncate">{{ lbl.name }}</span>
                        </span>
                    </label>
                }
            </div>
        </section>

        <div class="grid gap-4 md:grid-cols-2">
            <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Grouping</label>
                <select
                    [(ngModel)]="granularity"
                    class="mt-3 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
                >
                    <option value="day">By Day</option>
                    <option value="week">By Week</option>
                    <option value="month">By Month</option>
                    <option value="year">By Year</option>
                </select>
            </section>

            <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Chart</label>
                <select
                    [(ngModel)]="chartMode"
                    class="mt-3 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
                >
                    <option value="bar">Bar</option>
                    <option value="line">Line</option>
                    <option value="stacked">Stacked</option>
                    <option value="cumulative">Cumulative</option>
                </select>
            </section>
        </div>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
            <label class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Table density</label>
            <select
                [(ngModel)]="rowDensity"
                class="mt-3 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-400/20"
            >
                <option value="comfortable">Comfortable</option>
                <option value="compact">Compact</option>
            </select>
        </section>
    </div>
</div>
